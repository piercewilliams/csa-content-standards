backend:
  name: git-gateway
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "docs"
    label: "Documentation"
    files:

      - label: "Home"
        name: "home"
        file: "index.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "default" }
          - { label: "Title", name: "title", widget: "hidden", default: "Home" }
          - { label: "Body", name: "body", widget: "markdown" }

      - label: "Master Reference"
        name: "master-reference"
        file: "docs/master-reference.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "default" }
          - { label: "Title", name: "title", widget: "hidden", default: "Master Reference" }
          - { label: "Body", name: "body", widget: "markdown", hint: "This is the authoritative single-source document. Edit individual section pages instead where possible." }

      - label: "General Guidelines"
        name: "brand-guidelines"
        file: "docs/brand-guidelines.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "default" }
          - { label: "Title", name: "title", widget: "hidden", default: "General Guidelines" }
          - { label: "Body", name: "body", widget: "markdown", hint: "Universal rules — applies to all formats unless a format-specific page explicitly overrides." }

      - label: "Headlines"
        name: "headlines"
        file: "docs/headlines.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "default" }
          - { label: "Title", name: "title", widget: "hidden", default: "Headlines" }
          - { label: "Body", name: "body", widget: "markdown", hint: "Add each outlet as a <details> block. Character counts: H1 95–100, SEO Title 60–70, Promo 65–70, Meta 100–165." }

      - label: "Google Discover Explainer"
        name: "discover-explainer"
        file: "docs/discover-explainer.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "default" }
          - { label: "Title", name: "title", widget: "hidden", default: "Google Discover Explainer" }
          - { label: "Body", name: "body", widget: "markdown", hint: "Format-specific rules. These override Brand Guidelines where they conflict." }

      - label: "Everything to Know"
        name: "everything-to-know"
        file: "docs/everything-to-know.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "default" }
          - { label: "Title", name: "title", widget: "hidden", default: "Everything to Know" }
          - { label: "Body", name: "body", widget: "markdown", hint: "Format-specific rules. These override Brand Guidelines where they conflict. Headline formula: [Subject]: Everything You Need to Know. Word count: 500–1,500. H2 intro minimum: 80 words." }

      - label: "Recipe"
        name: "recipe"
        file: "docs/recipe.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "default" }
          - { label: "Title", name: "title", widget: "hidden", default: "Recipe" }
          - { label: "Body", name: "body", widget: "markdown", hint: "Format-specific rules. These override Brand Guidelines where they conflict. Focus keyphrase: [Recipe Name] recipe. 'Recipe' must appear in H1 and SEO title. SEO title: 50–70 characters. Intro: 150–350 words. URL: [dish-name]-recipe." }

      - label: "Timeline"
        name: "timeline"
        file: "docs/timeline.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "default" }
          - { label: "Title", name: "title", widget: "hidden", default: "Timeline" }
          - { label: "Body", name: "body", widget: "markdown", hint: "Format-specific rules. These override Brand Guidelines where they conflict. Headline formula: [Subject]: A Complete Timeline or [Subject]: A Complete Breakdown. Focus keyphrase: [Subject] timeline. Word count: 500–2,000. Every entry needs a date and a photo. URL: [subject]-relationship-timeline." }

      - label: "Interview"
        name: "interview"
        file: "docs/interview.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "default" }
          - { label: "Title", name: "title", widget: "hidden", default: "Interview" }
          - { label: "Body", name: "body", widget: "markdown", hint: "Format-specific rules. These override Brand Guidelines where they conflict. Headline formula: [Celebrity Name] on [Topic]: '[Quote]' (EXCLUSIVE). Focus keyphrase: [Celebrity Name] interview. Word count: 500–1,500. Q&A or narrative structure." }

      - label: "Recap"
        name: "recap"
        file: "docs/recap.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "default" }
          - { label: "Title", name: "title", widget: "hidden", default: "Recap" }
          - { label: "Body", name: "body", widget: "markdown", hint: "Format-specific rules. These override Brand Guidelines where they conflict. Headline formula: [Show/Movie Name] Recap: [Number] Biggest Moments From [Episode Title]. UsW alternate: [Show/Movie Name] Ending Explained. Focus keyphrase: [Show/Movie Name] recap. Word count: 400–800. Analysis required — not just plot summary. Always link to previous episode recap." }

      - label: "Fan Theory / Fan Question"
        name: "fan-content"
        file: "docs/fan-content.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "default" }
          - { label: "Title", name: "title", widget: "hidden", default: "Fan Theory / Fan Question" }
          - { label: "Body", name: "body", widget: "markdown", hint: "Two subtypes: Fan Theory (explain theory + evidence) and Fan Question (answer directly + context). Word count: 300–500 — shortest format. UsW: each theory/question = own H2 with Google Trends keyword. Focus keyphrase: [Show Name] fan theory or [Show Name] fan question." }

      - label: "Obituary"
        name: "obituary"
        file: "docs/obituary.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "default" }
          - { label: "Title", name: "title", widget: "hidden", default: "Obituary" }
          - { label: "Body", name: "body", widget: "markdown", hint: "CONFIRM DEATH BEFORE PUBLISHING. Headline formula: [Celebrity Name] Dead: [Descriptor] Was [Age]. Focus keyphrase: [Celebrity Name] dead. Word count: 300–600 (UsW: 500). UsW: cause of death = separate story. WW: legacy/career retrospective framing. Do not speculate on cause of death." }

      - label: "Couple / Baby"
        name: "couple-baby"
        file: "docs/couple-baby.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "default" }
          - { label: "Title", name: "title", widget: "hidden", default: "Couple / Baby" }
          - { label: "Body", name: "body", widget: "markdown", hint: "Two subtypes: Couple ([Celebrity A] and [Celebrity B]'s Relationship Timeline) and Baby (Welcomes / Pregnant / Gives Birth formulas). Discover-specific variants available for Baby. Word count: 200–500 (UsW: 500 minimum). Only report confirmed details — no speculation." }

      - label: "Cast Introduction / Update"
        name: "cast"
        file: "docs/cast.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "default" }
          - { label: "Title", name: "title", widget: "hidden", default: "Cast Introduction / Update" }
          - { label: "Body", name: "body", widget: "markdown", hint: "Two subtypes: Cast Update ([Show/Movie Name] Cast Update: Who's In and Who's Out) and Cast Introduction (Meet the Cast of [Show/Movie Title]: [Name], [Name] and More — UsW). Focus keyphrase: [Show/Movie Name] cast. Word count: 400–500. UsW: gallery or H2 format. Label each change as joining/leaving/role change." }

      - label: "FAQ / Service Journalism"
        name: "faq"
        file: "docs/faq.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "default" }
          - { label: "Title", name: "title", widget: "hidden", default: "FAQ / Service Journalism" }
          - { label: "Body", name: "body", widget: "markdown", hint: "Format-specific rules. These override Brand Guidelines where they conflict. Headline formula: [Topic] [Question Word]: [Specific Question Answered]. Focus keyphrase: exact search query (e.g. 'Social Security check dates 2025'). Word count: 300–500 per answer block. Every H2 needs a Google Trends/PAA keyword. Answer-first: first 1–2 sentences must be snippet-ready." }

      - label: "Persona: The Discover Browser"
        name: "discover-browser"
        file: "docs/discover-browser.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "default" }
          - { label: "Title", name: "title", widget: "hidden", default: "Persona: The Discover Browser" }
          - { label: "Body", name: "body", widget: "markdown" }

      - label: "Persona: The Curious Optimizer"
        name: "curious-optimizer"
        file: "docs/curious-optimizer.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "default" }
          - { label: "Title", name: "title", widget: "hidden", default: "Persona: The Curious Optimizer" }
          - { label: "Body", name: "body", widget: "markdown", hint: "Psychographic-first persona for trend and self-improvement content. Platform: Trend Hunter / B2C Channels." }

      - label: "Persona: The Wonder-Driven Science Enthusiast"
        name: "science-enthusiast"
        file: "docs/science-enthusiast.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "default" }
          - { label: "Title", name: "title", widget: "hidden", default: "Persona: The Wonder-Driven Science Enthusiast" }
          - { label: "Body", name: "body", widget: "markdown", hint: "Awe-driven reader for science, nature, and discovery content. Platform: Science / Discovery Features." }

      - label: "Persona: The Curious Explorer"
        name: "curious-explorer"
        file: "docs/curious-explorer.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "default" }
          - { label: "Title", name: "title", widget: "hidden", default: "Persona: The Curious Explorer" }
          - { label: "Body", name: "body", widget: "markdown", hint: "Deep-engagement reader for science, nature, archaeology, and discovery content. Engagement: 30–70+ seconds, 28–55% scroll depth." }

      - label: "Persona: The Watercooler Insider"
        name: "watercooler-insider"
        file: "docs/watercooler-insider.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "default" }
          - { label: "Title", name: "title", widget: "hidden", default: "Persona: The Watercooler Insider" }
          - { label: "Body", name: "body", widget: "markdown", hint: "Social-currency reader for viral, entertainment, and pop culture content. Bimodal engagement: 2–15s (high-traffic) or 30–60s (debunks/drama)." }

      - label: "Acceptable Sources"
        name: "acceptable-sources"
        file: "docs/acceptable-sources.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "default" }
          - { label: "Title", name: "title", widget: "hidden", default: "Acceptable Sources" }
          - { label: "Body", name: "body", widget: "markdown", hint: "Add new sources as rows in the relevant vertical's table. Each source needs: name, URL, type, and notes." }

      - label: "Publishing Guidelines"
        name: "publishing-guidelines"
        file: "docs/publishing-guidelines.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "default" }
          - { label: "Title", name: "title", widget: "hidden", default: "Publishing Guidelines" }
          - { label: "Body", name: "body", widget: "markdown", hint: "Platform-specific rules — CMS entry and submission, not writing style." }

      - label: "AI Tool Responsibility"
        name: "tool-responsibility"
        file: "docs/tool-responsibility.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "default" }
          - { label: "Title", name: "title", widget: "hidden", default: "AI Tool Responsibility" }
          - { label: "Body", name: "body", widget: "markdown", hint: "Team responsibilities for CSA and partner feed content. Includes escalation chain, plagiarism checks, partner content vetting, and override documentation." }

      - label: "Claims Validation"
        name: "claims-validation"
        file: "docs/claims-validation.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "default" }
          - { label: "Title", name: "title", widget: "hidden", default: "Claims Validation" }
          - { label: "Body", name: "body", widget: "markdown", hint: "How to read and act on the CSA fact-checking module output. Covers the five verdicts, Needs Correction / Needs Clarification taxonomy, source authority tiers, content-type specific rules (health, legal, financial, real estate, travel, entertainment), escalation logic, and override documentation." }

      - label: "Follow-Up Content"
        name: "follow-up-content"
        file: "docs/follow-up-content.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "default" }
          - { label: "Title", name: "title", widget: "hidden", default: "Follow-Up Content" }
          - { label: "Body", name: "body", widget: "markdown", hint: "Editorial strategy for extending breaking news coverage. Decision framework: newsworthy? → write original (never syndicate); site normally covers? → follow-up content. Story types: death, arrest, breakup, interview, release, controversy, pregnancy, wedding, and more." }

      - label: "SmartNews"
        name: "platform-smartnews"
        file: "docs/platform-smartnews.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "default" }
          - { label: "Title", name: "title", widget: "hidden", default: "SmartNews" }
          - { label: "Body", name: "body", widget: "markdown", hint: "Platform format guide for SmartNews (§10.1). Covers headline range (70–90 chars, 80–99 sweet spot), SmartView structure constraints (no CSS/scripted styling), feed thumbnail specs (media:thumbnail, 4:3, 320×240px), GIF prohibition, read-velocity optimization, analytics caveat (GA4 tracks in-app views not referral traffic), and monetization." }

      - label: "Apple News"
        name: "platform-apple-news"
        file: "docs/platform-apple-news.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "default" }
          - { label: "Title", name: "title", widget: "hidden", default: "Apple News" }
          - { label: "Body", name: "body", widget: "markdown", hint: "Platform format guide for Apple News (§10.2). Covers headline range (90–120 chars, peak at 110–119), question/number-led headline avoidance for algorithmic reach (featured placement exception documented), subtitle field requirement, ANF vs RSS, AI content policy (byline/co-byline + News Publisher metadata), thumbnail specs, affiliate opportunity, and monetization (100% self-sold, 70% Apple-sold)." }

      - label: "Documentation"
        name: "documentation"
        file: "docs/documentation.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "default" }
          - { label: "Title", name: "title", widget: "hidden", default: "Documentation" }
          - { label: "Body", name: "body", widget: "markdown", hint: "Meta-documentation for the site itself — what it is, how it's structured, how to read format pages, how to edit, versioning, and technical stack." }

      - label: "Collaboration Guide"
        name: "collaboration-guide"
        file: "docs/collaboration-guide.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "default" }
          - { label: "Title", name: "title", widget: "hidden", default: "Collaboration Guide" }
          - { label: "Body", name: "body", widget: "markdown" }

      - label: "Changelog"
        name: "changelog"
        file: "docs/changelog.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "default" }
          - { label: "Title", name: "title", widget: "hidden", default: "Changelog" }
          - { label: "Body", name: "body", widget: "markdown", hint: "Add new versions at the top. Format: ## [version] — YYYY-MM-DD" }
