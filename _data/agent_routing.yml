# Agent Routing Vocabulary
# Single source of truth for AGENT-AUDIENCE tags used throughout this site.
#
# Every page uses two mechanisms to declare its routing:
#   1. Page-level frontmatter:  agent_audiences: [tag, tag, ...]
#   2. Section-level comments:  <!-- AGENT-AUDIENCE: tag -->
#
# To extract rules for a specific input, grep the raw Markdown source for
# 'AGENT-AUDIENCE: [tag]' and take everything between that comment and the next one.
# The full routing table is at the top of docs/brand-guidelines.md.

tags:
  general-style:
    label: "General Style"
    description: "General style for all work — voice, tone, vocabulary, explicit language policy, anchor text rules"
    covers:
      - "§1.1 Voice & Tone"
      - "§1.3 Explicit Language Policy"
      - "§1.4 Anchor Text Rules and link count"
      - "Tone, Word Count, Article Structure, Formatting Rules on all format pages"
      - "All persona pages (§4)"
      - "§5 Acceptable Sources (citation context)"

  headline:
    label: "Headline (H1)"
    description: "H1 headline guidance, abstracted from SEO needs — character count, formula, verb requirement, modifier rules"
    covers:
      - "§1.2 General Rules, H1 character count (80–100), Modifier Guidelines, Exclusive Guidelines"
      - "Headline (H1) section on all format pages"
      - "All format-specific and outlet-specific headline formula blocks in §2 Headlines"

  seo:
    label: "SEO"
    description: "SEO title, focus keyphrase, meta description, promo/homepage title"
    covers:
      - "§1.2 Focus Keyphrase, SEO Title Rules, Promo/Homepage Title Rules, Meta Description Rules"
      - "SEO Title, Dek, Meta Description, Focus Keyphrase sections on all format pages"

  human-only:
    label: "Human Only"
    description: "Human editorial workflows — not consumed by any CSA agent at this stage"
    covers:
      - "§1.4 What to Link To (tag page navigation is not yet a CSA capability)"
      - "§1.5 Byline & Credit Rules"
      - "§1.6 AI Disclosure"
      - "§1.7 Google Helpful Content Standard"
      - "§1.8 Universal Compliance Rules"
      - "§1.9 Breaking News & Follow-Up Content"
      - "Internal Links, Hero Image, URL Structure, Tags, What to Avoid, Pre-Publish Checklist on all format pages"
      - "§6 Publishing Guidelines"
      - "§7 Follow-Up Content"
      - "§8 AI Tool Responsibility (escalation, plagiarism, partner content, override documentation)"
      - "§9 Claims Validation (verdict handling, source verification, audit trail, override tracking)"
      - "§2 Headlines outlet-specific CMS and compliance notes"

# Standard section-to-tag mapping for article format pages (§3)
# Apply this mapping when adding routing annotations to any new format page.
format_page_mapping:
  Purpose: ~                  # untagged — general context for all agents
  "Headline (H1)": headline
  "SEO Title": seo
  "Dek": seo
  "Meta Description": seo
  "Focus Keyphrase": seo
  "Tone": general-style
  "Word Count": general-style
  "Article Structure": general-style
  "Formatting Rules": general-style
  "Internal Links": human-only
  "Hero Image": human-only
  "URL Structure": human-only
  "Tags": human-only
  "What to Avoid": human-only
  "Pre-Publish Checklist": human-only
